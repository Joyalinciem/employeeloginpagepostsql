<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .navbar h1 {
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            font-size: 14px;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .tasks-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .tasks-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .task-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .task-form input,
        .task-form textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .task-form textarea {
            grid-column: 1 / 3;
        }
        
        .task-form button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .task-form button:hover {
            transform: translateY(-2px);
        }
        
        .tasks-list {
            display: grid;
            gap: 15px;
        }
        
        .task-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        .task-item.completed {
            opacity: 0.6;
            border-left-color: #28a745;
        }
        
        .task-content h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .task-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .task-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #999;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
        }
        
        .task-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .delete-btn {
            background: #f8d7da;
            color: #721c24;
        }
        
        .delete-btn:hover {
            background: #f5c6cb;
        }
        
        .complete-btn {
            background: #d4edda;
            color: #155724;
        }
        
        .complete-btn:hover {
            background: #c3e6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>TaskFlow Dashboard</h1>
        <div class="user-info">
            <span id="userEmail">Loading...</span>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="dashboard-grid">
            <div class="card">
                <h2>📊 Total Tasks</h2>
                <p style="font-size: 32px; color: #667eea; font-weight: bold;" id="totalTasks">0</p>
            </div>
            <div class="card">
                <h2>✅ Completed</h2>
                <p style="font-size: 32px; color: #28a745; font-weight: bold;" id="completedTasks">0</p>
            </div>
            <div class="card">
                <h2>⏳ Pending</h2>
                <p style="font-size: 32px; color: #ffc107; font-weight: bold;" id="pendingTasks">0</p>
            </div>
        </div>

        <div class="tasks-section">
            <h2>Tasks</h2>
            
            <div class="task-form">
                <input type="text" id="taskTitle" placeholder="Task title...">
                <textarea id="taskDescription" placeholder="Description..." rows="2"></textarea>
                <select id="taskPriority" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button onclick="createTask()">Create Task</button>
            </div>

            <div id="errorMessage" class="error" style="display: none;"></div>
            
            <div id="tasksList" class="tasks-list">
                <div class="empty-state">Loading tasks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        
        // Initialize dashboard
        window.addEventListener("load", () => {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "login.html";
                return;
            }
            
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            document.getElementById("userEmail").textContent = user.email || "User";
            
            loadTasks();
        });
        
        async function loadTasks() {
            const token = localStorage.getItem("token");
            const tasksList = document.getElementById("tasksList");
            
            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = "login.html";
                        return;
                    }
                    throw new Error("Failed to load tasks");
                }
                
                const data = await response.json();
                const tasks = data.tasks || data || [];
                
                updateDashboardStats(tasks);
                renderTasks(tasks);
                
            } catch (error) {
                console.error("Error loading tasks:", error);
                tasksList.innerHTML = `<div class="empty-state">Failed to load tasks. Please refresh the page.</div>`;
            }
        }
        
        function updateDashboardStats(tasks) {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === "completed").length;
            const pending = total - completed;
            
            document.getElementById("totalTasks").textContent = total;
            document.getElementById("completedTasks").textContent = completed;
            document.getElementById("pendingTasks").textContent = pending;
        }
        
        function renderTasks(tasks) {
            const tasksList = document.getElementById("tasksList");
            
            if (tasks.length === 0) {
                tasksList.innerHTML = `<div class="empty-state">No tasks yet. Create one to get started!</div>`;
                return;
            }
            
            tasksList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status === "completed" ? "completed" : ""}">
                    <div class="task-content">
                        <h3>${task.title || "Untitled"}</h3>
                        <p>${task.description || "No description"}</p>
                        <div class="task-meta">
                            <span>Priority: <strong>${task.priority || "N/A"}</strong></span>
                            <span>Status: <strong>${task.status || "pending"}</strong></span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="complete-btn" onclick="updateTask('${task.id}', 'completed')">
                            ${task.status === "completed" ? "Reopen" : "Complete"}
                        </button>
                        <button class="delete-btn" onclick="deleteTask('${task.id}')">Delete</button>
                    </div>
                </div>
            `).join("");
        }
        
        async function createTask() {
            const token = localStorage.getItem("token");
            const title = document.getElementById("taskTitle").value;
            const description = document.getElementById("taskDescription").value;
            const priority = document.getElementById("taskPriority").value;
            const errorEl = document.getElementById("errorMessage");
            
            if (!title.trim()) {
                errorEl.textContent = "Please enter a task title";
                errorEl.style.display = "block";
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: title.trim(),
                        description: description.trim(),
                        priority,
                        status: "pending"
                    })
                });
                
                if (!response.ok) throw new Error("Failed to create task");
                
                document.getElementById("taskTitle").value = "";
                document.getElementById("taskDescription").value = "";
                errorEl.style.display = "none";
                
                loadTasks();
                
            } catch (error) {
                console.error("Error creating task:", error);
                errorEl.textContent = "Failed to create task. Please try again.";
                errorEl.style.display = "block";
            }
        }
        
        async function updateTask(taskId, newStatus) {
            const token = localStorage.getItem("token");
            
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        status: newStatus === "completed" ? "pending" : "completed"
                    })
                });
                
                if (!response.ok) throw new Error("Failed to update task");
                
                loadTasks();
                
            } catch (error) {
                console.error("Error updating task:", error);
            }
        }
        
        async function deleteTask(taskId) {
            if (!confirm("Are you sure you want to delete this task?")) return;
            
            const token = localStorage.getItem("token");
            
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error("Failed to delete task");
                
                loadTasks();
                
            } catch (error) {
                console.error("Error deleting task:", error);
            }
        }
        
        function logoutUser() {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
