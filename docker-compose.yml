

services:

  backend:
    build: .

    ports:
      - "5000:5000"

    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/taskmanager
      - JWT_SECRET=mysecretkey
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=465
      - EMAIL_SECURE=true
      - EMAIL_USER=majortest007@gmail.com
      - EMAIL_PASS=jjoz sjqq crzx tkgi
      - FROM_ADDRESS=Major Noreplay <majortest007@gmail.com>
      - REDIS_URL=redis://redis:6379

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend-react

    ports:
      - "5173:5173"

    volumes:
      - ./frontend-react:/app
      - /app/node_modules

    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=taskmanager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
